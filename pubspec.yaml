name: hawwil
description: تطبيق حوّل للخدمات المالية والبطاقات الرقمية
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management (إدارة الحالة)
  flutter_riverpod: ^2.4.9

  # Firebase (قواعد البيانات والمصادقة الأساسية)
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0

  # Advanced Authentication (المصادقة المتقدمة)
  sign_in_with_apple: ^6.1.1
  google_sign_in: ^6.2.1

  # UI & Styling (التصميم والواجهات)
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1 

  # Utilities (الأدوات المساعدة)
  intl: ^0.19.0
  http: ^1.2.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
