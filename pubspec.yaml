name: hawwil
description: تطبيق حوّل للخدمات المالية والبطاقات الرقمية
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.6.1

  # Firebase
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.3

  # Authentication
  google_sign_in: ^7.2.0 

  # UI & Design
  shimmer: ^3.0.0
  carousel_slider: ^5.1.2
  cached_network_image: ^3.4.1
  google_nav_bar: ^5.0.6
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  http: ^1.2.0
  image_picker: ^1.0.7
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
