name: hawwil
description: تطبيق حوّل للخدمات المالية والبطاقات الرقمية
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management (إدارة الحالة)
  flutter_riverpod: ^2.6.1

  # Firebase (قواعد البيانات والمصادقة الأساسية)
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.3

  # Advanced Authentication (المصادقة المتقدمة)
  sign_in_with_apple: ^8.1.0
  google_sign_in: ^7.2.0 

  # Utilities (الأدوات المساعدة)
  intl: ^0.20.2
  http: ^1.2.0
  image_picker: ^1.0.7
  riverpod: ^2.6.1
  shimmer: ^3.0.0
  carousel_slider: ^5.1.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
